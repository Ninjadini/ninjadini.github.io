<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ninjadini</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0d1117;
      color: #e6edf3;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .container {
      text-align: center;
    }

    h1 {
      font-size: 3rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 0.5rem;
    }

    h2 {
      color: #8b949e;
      font-size: 1.1rem;
      font-weight: 400;
      margin-bottom: 2rem;
    }

    .links {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      align-items: center;
    }

    a {
      color: #58a6ff;
      text-decoration: none;
      font-size: 0.95rem;
      border: 1px solid #30363d;
      padding: 0.5rem 1.2rem;
      border-radius: 6px;
      transition: border-color 0.2s, color 0.2s;
    }

    a:hover {
      border-color: #58a6ff;
      color: #79c0ff;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Ninjadini</h1>
    <h2>Hypsibius "Ninja" Dujardini</h2>
    <div class="links">
      <a href="https://ninjadini.github.io/njconsole/"><b>NjConsole</b> • Ninjadini Debug Console</a>
      <a href="https://github.com/Ninjadini/Neuro"><b>Neuro</b> • Open-source Unity data serialization & management</a>
      <a href="https://ninjadini.com/">ninjadini.com</a>
    </div>
  </div>
</body>
</html>
